<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Freibadfreunde Emsetal e.V. – mobil optimierte Startseite mit direkten Zugängen zu Mitgliedsantrag, Fördervereinbarung, Spenden, Kontakt sowie Aktuelles." />
  <title>Freibadfreunde Emsetal e.V.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="home-shell">
    <section class="orbit-stage" aria-labelledby="verein-name">
      <div class="orbit-grid">
        <button class="orbit-card orbit-card--membership" type="button" data-modal-key="membership" aria-haspopup="dialog">
          <span class="orbit-card__tag">Mitmachen</span>
          <h2 class="orbit-card__title">Mitglied werden</h2>
          <p class="orbit-card__text">Antrag, SEPA-Mandat und alle wichtigen Angaben kompakt öffnen.</p>
          <span class="orbit-card__cta">Details öffnen</span>
        </button>

        <button class="orbit-card orbit-card--news" type="button" data-modal-key="news" aria-haspopup="dialog">
          <span class="orbit-card__tag">Bleiben Sie dran</span>
          <h2 class="orbit-card__title">Infos &amp; Aktuelles</h2>
          <p class="orbit-card__text">Neuigkeiten, Hinweise und kurze Vereinsinformationen auf einen Blick.</p>
          <span class="orbit-card__cta">Details öffnen</span>
        </button>

        <div class="logo-core">
          <div class="logo-core__glow" aria-hidden="true"></div>
          <div class="brand-head">
            <h1 id="verein-name" class="brand-copy__title">Gemeinsam fürs Freibad.</h1>
          </div>

          <img
            src="logo-freibadfreunde-emsetal-transparent.png"
            alt="Logo Freibadfreunde Emsetal e.V."
            class="site-logo"
          />

          <div class="brand-copy">
            <p class="brand-copy__eyebrow">Freibadfreunde Emsetal e.V.</p>
          </div>
        </div>

        <button class="orbit-card orbit-card--donation" type="button" data-modal-key="donation" aria-haspopup="dialog">
          <span class="orbit-card__tag">Unterstützen</span>
          <h2 class="orbit-card__title">Spenden</h2>
          <p class="orbit-card__text">Jeder Beitrag hilft direkt bei Erhalt, Pflege und Zukunft des Freibads.</p>
          <span class="orbit-card__cta">Details öffnen</span>
        </button>

        <button class="orbit-card orbit-card--support" type="button" data-modal-key="support" aria-haspopup="dialog">
          <span class="orbit-card__tag">Fördern</span>
          <h2 class="orbit-card__title">Fördervereinbarung</h2>
          <p class="orbit-card__text">Förderzuwendung und Lastschriftmandat direkt im passenden Fenster öffnen.</p>
          <span class="orbit-card__cta">Details öffnen</span>
        </button>

        <button class="orbit-card orbit-card--contact" type="button" data-modal-key="contact" aria-haspopup="dialog">
          <span class="orbit-card__tag">Kontakt</span>
          <h2 class="orbit-card__title">Schreiben Sie uns</h2>
          <p class="orbit-card__text">Kontaktformular im eigenen Fenster öffnen und direkt mit uns in Verbindung treten.</p>
          <span class="orbit-card__cta">Kontakt öffnen</span>
        </button>
      </div>
    </section>
  </main>

  <div id="modal-overlay" class="modal-overlay is-hidden" aria-hidden="true">
    <section class="modal-window" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button id="modal-close" class="modal-close" type="button" aria-label="Fenster schließen">×</button>
      <div id="modal-content" class="modal-content"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
